<!DOCTYPE html><html><head><meta charset="utf-8"><title>comp-card.html</title><link rel="stylesheet" href="_card.css"><style>
.btn{font-family:var(--sans-body);font-weight:600;font-size:0.95rem;border-radius:8px;padding:11px 22px;border:1px solid transparent;cursor:pointer;transition:all .25s ease;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--gold-600);color:var(--fg-on-gold);box-shadow:var(--shadow-sm)}
.btn-primary:hover{background:var(--gold-700)}
.btn-cool{background:var(--lapis-700);color:#fff}
.btn-cool:hover{background:var(--lapis-900)}
.btn-ghost{background:transparent;color:var(--crimson-700);border-color:var(--surface-border)}
.btn-ghost:hover{border-color:var(--gold-500);color:var(--crimson-900)}
.btn-pill{border-radius:999px;background:transparent;border-color:var(--gold-500);color:var(--gold-700);padding:10px 24px}
.btn-pill:hover{background:var(--gold-100)}
.field{font-family:var(--sans-body);font-size:0.95rem;padding:11px 14px;border-radius:8px;border:1px solid var(--surface-border);background:#fff;width:230px;color:var(--fg1)}
.field::placeholder{color:var(--fg3)}
.field:focus{outline:none;border-color:var(--gold-500);box-shadow:0 0 0 3px var(--gold-100)}
.flabel{font-size:0.78rem;font-weight:600;letter-spacing:.04em;color:var(--fg2);margin-bottom:6px;display:block}
.badge{font-family:var(--sans-body);font-size:0.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:5px 11px;border-radius:999px;display:inline-block}
.b-gold{background:var(--gold-100);color:var(--gold-900)}
.b-lapis{background:var(--lapis-100);color:var(--lapis-700)}
.b-terra{background:var(--terra-100);color:var(--terra-700)}
.b-line{background:transparent;border:1px solid var(--surface-border);color:var(--fg2)}
.ucard{position:relative;background:#fff;border:1px solid var(--surface-border);border-radius:14px;box-shadow:var(--shadow-md);overflow:hidden;width:280px}
.ucard .top{height:5px;background:linear-gradient(90deg,var(--gold-500),var(--gold-300))}
.ucard .body{padding:18px 20px 26px}
/* ornamental gilded bottom-right corner */
.ucard .corner{position:absolute;right:0;bottom:0;width:64px;height:64px;pointer-events:none}
.ucard .corner::before{content:"";position:absolute;right:9px;bottom:9px;width:40px;height:40px;border-right:2px solid var(--gold-500);border-bottom:2px solid var(--gold-500);border-bottom-right-radius:13px}
.ucard .corner::after{content:"";position:absolute;right:14px;bottom:14px;width:26px;height:26px;border-right:1px solid var(--gold-400);border-bottom:1px solid var(--gold-400);border-bottom-right-radius:9px}
.ucard .corner .glyph{position:absolute;right:16px;bottom:11px;color:var(--gold-600);font-size:0.92rem;line-height:1}
</style></head><body><p class="card-label">Content card</p>
<div class="ucard"><div class="top"></div><div class="body">
<div class="eyebrow" style="font-size:0.68rem">FROM THE LIBRARY</div>
<div class="h3" style="font-size:1.4rem;margin:8px 0 6px">The breath as prayer</div>
<p style="margin:0;font-size:0.9rem;color:var(--fg2)">A short practice on the rhythm of zikr and the listening heart.</p>
</div><div class="corner"><span class="glyph">&#10087;</span></div></div></body></html>
